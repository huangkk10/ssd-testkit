# PyInstaller packaging configuration file
# Only configure the core information; others use defaults

# Version and project information
version: "1.0.0"
project_name: "RunTest"

# Release package name.
# Supports the {date} placeholder which expands to today's date (YYYYMMDD).
# Comment out or leave empty to use the default naming: {test_root_name}_v{version}
release_name: "SSD_TestKit_{date}"

# Auto-discover all testcases under this directory.
# Every subdirectory that contains a test_main.py will be packaged automatically.
# No need to list individual test projects.
test_root: tests/integration/test_case

# Default testcase to run when RunTest.exe is invoked without --test argument.
default_test: tests/integration/test_case/stc2557_adk_s3s4s5
