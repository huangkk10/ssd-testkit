# osconfig.yaml — stc2557_adk_s3s4s5
# SUT 準備清單：停用 Task Scheduler 中會干擾測試的工作
#
# 欄位說明請參考 lib/testtool/osconfig/config.py OsConfigProfile
# 未列出的欄位維持預設值 (False / "")

# SystemRestore：停用 C:\ 的系統還原
# （透過 Disable-ComputerRestore + registry DisableSR=1）
disable_system_restore: true

# MemoryDiagnostic：停用 RunFullMemoryDiagnostic 排程工作
# Task path: \Microsoft\Windows\MemoryDiagnostic\RunFullMemoryDiagnostic
disable_memory_diagnostic_tasks: true

# McAfee：停用 McAfee 排程工作（若未安裝則自動 no-op）
# Tasks: \McAfee\McAfee Auto Maintenance Task Agent
#        \McAfee\DAD.WPS.Execute.Updates
disable_mcafee_tasks: true

# Fast Startup：停用 HiberbootEnabled，確保每次 shutdown/reboot 為完整 power cycle
# Registry: HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Power
#           HiberbootEnabled = 0
# NOTE: 必須設為 false，BPFS (Boot Performance Fast Startup) assessment
#       需要 Fast Startup 啟用才能執行；WAC 會自行管理 Fast Startup 狀態
disable_fast_startup: false

# 自動登入：開機後自動以指定帳號登入（僅限 lab 機器；密碼儲存為明文）
# Registry: HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon
#           AutoAdminLogon = "1"
#
# username：不填 → test_03 自動使用目前登入的使用者（getpass.getuser()）
# password：不填 → 必須設定環境變數 SSD_TESTKIT_AUTO_LOGIN_PASSWORD；否則 test_03 直接 fail
# domain  ：不填 → 預設 "." (本機帳號)
enable_auto_admin_logon: true
# auto_login_username: "Administrator"  # 若需強制指定帳號名稱請取消此行註解
auto_login_password: ""                # 填入測試機登入密碼，或留空並設定 SSD_TESTKIT_AUTO_LOGIN_PASSWORD 環境變數
# auto_login_domain: "."               # 本機帳號留空或用 "."

# Test Signing：關閉 bcdedit testsigning，確保 kernel 驅動程式簽章驗證正常
# Command: bcdedit /set testsigning off
disable_test_signing: true

# UAC：停用使用者帳戶控制（EnableLUA=0），避免提權提示干擾自動化測試
# Registry: HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Policies\System
#           EnableLUA = 0
disable_uac: true
