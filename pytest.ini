[pytest]
# Pytest configuration
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show detailed output
addopts = 
    -v
    --tb=short
    --strict-markers
    -x

# Markers for organizing tests
markers =
    asyncio: marks tests as async (automatically applied to async test functions)
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    admin: marks tests requiring administrator (elevated) privileges
    hardware: marks tests requiring hardware access
    timeout: marks tests with timeout limit
    real: marks tests requiring real hardware (vs mocked)
    real_bat: marks tests requiring real .bat file execution
    timeout: marks tests with timeout limit
    real: marks tests requiring real hardware (vs mocked)
    real_bat: marks tests requiring real .bat file execution
    # Customer dimension
    client_lenovo: Lenovo client tests
    client_hp: HP client tests
    client_samsung: Samsung client tests
    client_micron: Micron client tests
    client_asus: ASUS client tests
    client_acer: Acer client tests
    # Interface dimension
    interface_pcie: PCIe interface tests
    interface_sata: SATA interface tests
    interface_nvme: NVMe protocol tests
    # Project dimension
    project_storagedv: StorageDV project tests
    project_ciq: CIQ project tests
    project_standard: Standard validation tests
    # Feature dimension
    feature_burnin: BurnIN stress tests
    feature_modern_standby: Modern Standby (ACPI S0ix) tests
    feature_power: Power management tests
    feature_storage: Storage stress tests
    # Tool-specific integration markers
    requires_burnin: mark test as requiring BurnIN installation
    requires_cdi: mark test as requiring DiskInfo64.exe and a real disk
    requires_phm: mark test as requiring PHM installation or installer
    requires_pwrtest: mark test as requiring pwrtest.exe
    requires_python_installer: mark test as requiring Python installer accessibility
    requires_reboot: mark test as requiring real OS reboot capability (set ENABLE_REBOOT_INTEGRATION_TEST=1)
    requires_sleepstudy: mark test as requiring the sleepstudy package and tmp/sleepstudy-report.html
    requires_choco: mark test as requiring Chocolatey CLI on PATH
    requires_playwright_browsers: mark test as requiring playwright-browsers choco package
    # Meta markers
    critical: Critical test cases
    regression: Regression test suite
    
# Log settings
log_cli = true
log_cli_level = DEBUG
log_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Minimum version
minversion = 6.0

# Asyncio configuration
asyncio_mode = auto
